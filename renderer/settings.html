<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
	<title>前紙 の設定</title>
	<link rel="stylesheet" href="settings.css">
</head>
<body>
	<div class="layout">
		<nav class="sidebar">
			<div class="brand">前紙</div>
			<button class="nav-item active" data-target="section-global">全体</button>
			<div id="layer-nav"></div>
			<button id="add-layer" class="add-layer">＋ レイヤーを追加</button>
			<div class="about">
				<div class="about-name">前紙</div>
				<div class="about-version" id="app-version"></div>
				<div class="about-copyright">© 2026 Romly</div>
			</div>
		</nav>
		<main class="content">
			<section id="section-global" class="section active">
				<h1>全体</h1>
				<div class="card">
					<div class="row">
						<div class="row-text">
							<div class="row-title">不透明度</div>
							<div class="row-desc">ウィンドウ全体の透け具合。すべてのレイヤーに共通で掛かる。</div>
						</div>
						<div class="row-control">
							<input type="range" id="opacity" min="10" max="100" step="5">
							<span class="value" id="opacity-value">50%</span>
						</div>
					</div>
				</div>
				<div class="card">
					<div class="row">
						<div class="row-text">
							<div class="row-title">マウスの周りを覗く</div>
							<div class="row-desc">カーソルの周りだけ画像をくり抜いて、下のデスクトップを覗けるようにする。全レイヤーを貫いて穴を開ける。</div>
						</div>
						<div class="row-control">
							<label class="switch">
								<input type="checkbox" id="cursor-mask">
								<span class="track"></span>
							</label>
						</div>
					</div>
					<div class="sub-row hidden" id="mask-radius-row">
						<div class="row-text">
							<div class="row-title">覗き穴の半径</div>
							<div class="row-desc">くり抜く円の大きさ。縁のぼかしも合わせて拡大縮小する。</div>
						</div>
						<div class="row-control">
							<input type="range" id="mask-radius" min="60" max="400" step="10">
							<span class="value" id="mask-radius-value">160px</span>
						</div>
					</div>
				</div>
			</section>
			<div id="layer-sections"></div>
		</main>
	</div>

	<template id="layer-template">
		<section class="section layer-section">
			<h1 class="layer-title">レイヤー</h1>
			<p class="layer-hint">番号が大きいレイヤーほど手前に重なります。ドロップシャドウのずらしとぼかしをレイヤーごとに変えると奥行きが出ます。</p>

			<h2 class="group-title">メディア</h2>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">表示するフォルダ</div>
						<div class="row-desc media-dir">未選択</div>
					</div>
					<div class="row-control">
						<button class="btn choose-dir">変更...</button>
					</div>
				</div>
			</div>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">メディアの種類</div>
						<div class="row-desc">表示するメディアを画像と動画の両方にするか、どちらか一方に絞るか。</div>
					</div>
					<div class="row-control">
						<div class="dropdown media-kind" data-value="both">
							<button type="button" class="dropdown-toggle">
								<span class="dropdown-label">画像と動画</span>
								<span class="dropdown-caret" aria-hidden="true"></span>
							</button>
							<ul class="dropdown-menu" role="listbox">
								<li class="dropdown-option" data-value="both" role="option">画像と動画</li>
								<li class="dropdown-option" data-value="image" role="option">画像のみ</li>
								<li class="dropdown-option" data-value="video" role="option">動画のみ</li>
							</ul>
						</div>
					</div>
				</div>
			</div>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">シャッフル</div>
						<div class="row-desc">表示順をランダムにする。</div>
					</div>
					<div class="row-control">
						<label class="switch">
							<input type="checkbox" class="shuffle">
							<span class="track"></span>
						</label>
					</div>
				</div>
			</div>

			<h2 class="group-title">表示</h2>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">表示方法</div>
						<div class="row-desc">画面いっぱいに覆うか、画像全体を収めるか、ランダムな位置に置くか。</div>
					</div>
					<div class="row-control">
						<div class="segmented display-mode">
							<button data-value="cover">画面を覆う</button>
							<button data-value="contain">画像を収める</button>
							<button data-value="random">ランダム配置</button>
						</div>
					</div>
				</div>
				<div class="sub-row size-row">
					<div class="row-text">
						<div class="row-title">表示サイズ</div>
						<div class="row-desc">デスクトップに対する画像の大きさ。</div>
					</div>
					<div class="row-control">
						<input type="range" class="size-percent" min="2" max="100" step="2">
						<span class="value size-percent-value">100%</span>
					</div>
				</div>
				<div class="sub-row corner-row">
					<div class="row-text">
						<div class="row-title">角丸</div>
						<div class="row-desc">画像の四隅を丸める大きさ。デスクトップの短辺を基準にし、小さく表示された画像では自動で控えめになる。</div>
					</div>
					<div class="row-control">
						<input type="range" class="corner-percent" min="0" max="5" step="0.2">
						<span class="value corner-percent-value">0%</span>
					</div>
				</div>
			</div>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">エフェクト</div>
						<div class="row-desc">縁をぼかしてデスクトップに馴染ませるか、影を落として浮かせるか。</div>
					</div>
					<div class="row-control">
						<div class="dropdown display-effect" data-value="none">
							<button type="button" class="dropdown-toggle">
								<span class="dropdown-label">なし</span>
								<span class="dropdown-caret" aria-hidden="true"></span>
							</button>
							<ul class="dropdown-menu" role="listbox">
								<li class="dropdown-option" data-value="none" role="option">なし</li>
								<li class="dropdown-option" data-value="feather" role="option">ぼかし</li>
								<li class="dropdown-option" data-value="shadow" role="option">ドロップシャドウ</li>
							</ul>
						</div>
					</div>
				</div>
				<div class="sub-row shadow-row hidden">
					<div class="row-text">
						<div class="row-title">影の横ずらし</div>
						<div class="row-desc">影を左右へずらす量。正の値で右、負の値で左へ落ちる。</div>
					</div>
					<div class="row-control">
						<input type="range" class="shadow-x" min="-60" max="60" step="1">
						<span class="value shadow-x-value">0px</span>
					</div>
				</div>
				<div class="sub-row shadow-row hidden">
					<div class="row-text">
						<div class="row-title">影の縦ずらし</div>
						<div class="row-desc">影を上下へずらす量。正の値で下、負の値で上へ落ちる。</div>
					</div>
					<div class="row-control">
						<input type="range" class="shadow-y" min="-60" max="60" step="1">
						<span class="value shadow-y-value">14px</span>
					</div>
				</div>
				<div class="sub-row shadow-row hidden">
					<div class="row-text">
						<div class="row-title">影のぼかし</div>
						<div class="row-desc">影の輪郭のにじみ具合。大きいほど柔らかく広がり、遠くに浮いて見える。</div>
					</div>
					<div class="row-control">
						<input type="range" class="shadow-blur" min="0" max="80" step="1">
						<span class="value shadow-blur-value">28px</span>
					</div>
				</div>
				<div class="sub-row shadow-row hidden">
					<div class="row-text">
						<div class="row-title">影の濃さ</div>
						<div class="row-desc">影の不透明度。濃いほど手前に強く浮いて見える。</div>
					</div>
					<div class="row-control">
						<input type="range" class="shadow-opacity" min="0" max="100" step="5">
						<span class="value shadow-opacity-value">55%</span>
					</div>
				</div>
			</div>

			<h2 class="group-title">再生</h2>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">表示間隔</div>
						<div class="row-desc">1 枚を表示し続ける時間。</div>
					</div>
					<div class="row-control">
						<input type="range" class="display-duration" min="1" max="120" step="1">
						<span class="value display-duration-value">8.0 秒</span>
					</div>
				</div>
			</div>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">動画を最後まで再生</div>
						<div class="row-desc">表示間隔より長い動画は、一度の再生が終わるまで切り替えない。</div>
					</div>
					<div class="row-control">
						<label class="switch">
							<input type="checkbox" class="video-play-full">
							<span class="track"></span>
						</label>
					</div>
				</div>
			</div>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">フェード時間</div>
						<div class="row-desc">切り替え時に薄れ・現れる時間。</div>
					</div>
					<div class="row-control">
						<input type="range" class="fade-duration" min="0" max="5" step="0.1">
						<span class="value fade-duration-value">1.5 秒</span>
					</div>
				</div>
			</div>
			<div class="card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">切り替え間隔</div>
						<div class="row-desc">フェードアウトから次の表示までの空き時間。</div>
					</div>
					<div class="row-control">
						<input type="range" class="gap-duration" min="0" max="3" step="0.1">
						<span class="value gap-duration-value">0.6 秒</span>
					</div>
				</div>
			</div>

			<h2 class="group-title layer-remove-title"></h2>
			<div class="card layer-remove-card">
				<div class="row">
					<div class="row-text">
						<div class="row-title">このレイヤーを削除</div>
						<div class="row-desc">このレイヤーの設定を消し、表示から取り除く。</div>
					</div>
					<div class="row-control">
						<button class="btn danger remove-layer">削除</button>
					</div>
				</div>
			</div>
		</section>
	</template>

	<script src="settings.js"></script>
</body>
</html>
